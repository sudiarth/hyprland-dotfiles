# =============================================================================
# Hyprland config - Grayscale theme, rounded corners, Nvidia hybrid GPU
# =============================================================================

# -----------------------------------------------------------------------------
# NVIDIA / ENV
# -----------------------------------------------------------------------------
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = WLR_NO_HARDWARE_CURSORS,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# -----------------------------------------------------------------------------
# MONITOR (laptop left, external right)
# -----------------------------------------------------------------------------
monitor = eDP-1, 2880x1800@60, 0x0, 1.5
monitor = HDMI-A-1, 1920x1080@60, 1920x0, 1

# -----------------------------------------------------------------------------
# AUTOSTART
# -----------------------------------------------------------------------------
exec-once = waybar
exec-once = swaybg -i ~/Pictures/wallpapers/541062.jpg -m fill
exec-once = dunst
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = gnome-keyring-daemon --start --components=pkcs11,secrets,ssh
exec-once = hypridle

# -----------------------------------------------------------------------------
# INPUT
# -----------------------------------------------------------------------------
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
    }
}

# -----------------------------------------------------------------------------
# APPEARANCE
# -----------------------------------------------------------------------------
general {
    gaps_in = 6
    gaps_out = 12
    border_size = 4
    col.active_border = rgb(F2F2F2)
    col.inactive_border = rgb(616161)
    layout = dwindle
    allow_tearing = false
}

decoration {
    rounding = 16

    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = true
    }

    shadow {
        enabled = true
        range = 12
        render_power = 2
        color = rgba(00000055)
    }

    active_opacity = 1.0
    inactive_opacity = 0.92
}

animations {
    enabled = true
    bezier = ease, 0.25, 0.1, 0.25, 1.0
    bezier = overshoot, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 4, overshoot, slide
    animation = windowsOut, 1, 4, ease, slide
    animation = fade, 1, 3, ease
    animation = workspaces, 1, 4, overshoot, slide
    animation = border, 1, 4, ease
    animation = borderangle, 1, 4, ease
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

# -----------------------------------------------------------------------------
# KEYBINDINGS
# -----------------------------------------------------------------------------
$mod = SUPER

# Apps
bind = $mod, Return, exec, kitty
bind = $mod, space, exec, rofi -show drun -theme ~/.config/rofi/launchers/type-1/style-1.rasi
bind = $mod, D, exec, rofi -show drun -theme ~/.config/rofi/launchers/type-1/style-1.rasi
bind = $mod SHIFT, E, exec, rofi -show power-menu -theme ~/.config/rofi/powermenu/type-1/style-1.rasi
bind = $mod, F1, exec, ~/.config/hypr/show-keys.sh

# Window
bind = $mod SHIFT, Q, killactive
bind = $mod, F, fullscreen
bind = $mod SHIFT, space, togglefloating
bind = $mod, P, pseudo
bind = $mod, J, togglesplit

# Focus
bind = $mod, h, movefocus, l
bind = $mod, l, movefocus, r
bind = $mod, k, movefocus, u
bind = $mod, j, movefocus, d
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

# Move window
bind = $mod SHIFT, h, movewindow, l
bind = $mod SHIFT, l, movewindow, r
bind = $mod SHIFT, k, movewindow, u
bind = $mod SHIFT, j, movewindow, d
bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, down, movewindow, d

# Resize
bind = $mod, R, submap, resize
submap = resize
binde = , h, resizeactive, -20 0
binde = , l, resizeactive, 20 0
binde = , k, resizeactive, 0 -20
binde = , j, resizeactive, 0 20
binde = , left, resizeactive, -20 0
binde = , right, resizeactive, 20 0
binde = , up, resizeactive, 0 -20
binde = , down, resizeactive, 0 20
bind = , Return, submap, reset
bind = , Escape, submap, reset
submap = reset

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Move workspace between monitors
bind = $mod, p, movecurrentworkspacetomonitor, r
bind = $mod, o, movecurrentworkspacetomonitor, l

# Mouse bindings
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Volume (donut OSD)
binde = , XF86AudioRaiseVolume, exec, ~/.config/hypr/volume.sh up
binde = , XF86AudioLowerVolume, exec, ~/.config/hypr/volume.sh down
bind = , XF86AudioMute, exec, ~/.config/hypr/volume.sh mute
bind = , XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle

# Brightness (donut OSD)
binde = , XF86MonBrightnessUp, exec, ~/.config/hypr/brightness.sh up
binde = , XF86MonBrightnessDown, exec, ~/.config/hypr/brightness.sh down

# Media
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

# Screenshot
bind = , Print, exec, grim ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png
bind = $mod, Print, exec, grim -g "$(slurp)" ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png

# -----------------------------------------------------------------------------
# WINDOW RULES
# -----------------------------------------------------------------------------
windowrulev2 = float, class:(mpv|vlc|eog|feh|file-roller|xarchiver)
windowrulev2 = center, class:(mpv|vlc|eog|feh|file-roller|xarchiver)

# Workspace assignments (1-5 laptop, 6-10 external)
workspace = 1, monitor:eDP-1
workspace = 2, monitor:eDP-1
workspace = 3, monitor:eDP-1
workspace = 4, monitor:eDP-1
workspace = 5, monitor:eDP-1
workspace = 6, monitor:HDMI-A-1
workspace = 7, monitor:HDMI-A-1
workspace = 8, monitor:HDMI-A-1
workspace = 9, monitor:HDMI-A-1
workspace = 10, monitor:HDMI-A-1
