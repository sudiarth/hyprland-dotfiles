background {
    path = ~/Pictures/wallpapers/541062.jpg
    blur_passes = 3
    blur_size = 6
}

input-field {
    size = 280, 48
    outline_thickness = 3
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgb(F2F2F2)
    inner_color = rgb(303030)
    font_color = rgb(F2F2F2)
    fade_on_empty = true
    placeholder_text = <span foreground="##919191">Password</span>
    hide_input = false
    rounding = 24
    position = 0, -50
    halign = center
    valign = center
}

label {
    text = $TIME
    color = rgb(F2F2F2)
    font_size = 64
    font_family = Poppins
    position = 0, 80
    halign = center
    valign = center
}

label {
    text = cmd[update:3600000] date +"%A, %B %d"
    color = rgb(919191)
    font_size = 16
    font_family = Poppins
    position = 0, 20
    halign = center
    valign = center
}
